<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fight OP — Local (2 en un teclado)</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>⚔ FIGHT OP <span class="online" style="background:#ffa726">LOCAL</span></h1>
  <canvas id="juego" width="960" height="540"></canvas>

  <div class="controles">
    <div class="jugador j1">
      <h2>Jugador 1</h2>
      <p><b>A / D</b> mover · <b>W</b> saltar · <b>S</b> bloquear</p>
      <p><b>F</b> puño · <b>G</b> patada</p>
    </div>
    <div class="jugador j2">
      <h2>Jugador 2</h2>
      <p><b>← / →</b> mover · <b>↑</b> saltar · <b>↓</b> bloquear</p>
      <p><b>K</b> puño · <b>L</b> patada</p>
    </div>
  </div>
  <p style="font-size:13px"><a href="/" style="color:#7e8cff">← Volver al modo online</a></p>

  <script src="local.js"></script>
</body>
</html>
